services:
  - type: web
    name: spamshield-ai-backend
    env: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && gunicorn app:app --workers 1 --threads 2 --timeout 120
    systemPackages:
      - tesseract-ocr
      - tesseract-ocr-eng
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
